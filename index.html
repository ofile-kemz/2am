
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thoughts @ 2AM</title>
<style>
    body {
        margin: 0;
        font-family: 'Georgia', serif;
        background-color: #caa2d4;
        color: #000;
    }

    header {
        display: flex;
        justify-content: space-between;
        padding: 20px 40px;
        font-size: 20px;
    }

    header a {
        margin-right: 20px;
        text-decoration: none;
        color: black;
        font-weight: bold;
    }

    .hero {
        text-align: center;
        margin-top: 20px;
    }

    .hero h1 {
        font-size: 60px;
        font-weight: 500;
    }

    .start-btn {
        margin-top: 30px;
        padding: 20px 60px;
        background-color: #7f77a8;
        border: none;
        border-radius: 25px;
        font-size: 24px;
        cursor: pointer;
    }

    .tagline {
        margin-top: 20px;
        font-size: 24px;
    }

    .section {
        display: flex;
        justify-content: space-around;
        margin: 60px 40px;
        align-items: center;
    }

    .text-block {
        font-size: 40px;
        font-weight: bold;
        max-width: 400px;
    }

    .search-box {
        background-color: #7f77a8;
        padding: 20px 50px;
        border-radius: 25px;
        font-size: 22px;
    }

    .categories {
        display: flex;
        justify-content: space-around;
        margin: 50px 40px;
        text-align: center;
    }

    .card {
        width: 250px;
    }

    .card img {
        width: 100%;
        border-radius: 10px;
    }

    .card h3 {
        margin-top: 10px;
        font-size: 24px;
    }

    .more {
        text-align: right;
        margin-right: 50px;
        font-size: 24px;
        font-weight: bold;
    }
</style>
</head>

<body>

<header>
    <div>
        <a href="#">Home</a>
        <a href="#">Search</a>
        <a href="#">Info</a>
    </div>
</header>

<div class="hero">
    <h1>Welcome to “thoughts @2am”</h1>
    <button class="start-btn">START</button>
    <p class="tagline">Where your secrets transform to stories</p>
</div>

<div class="section">
    <div class="text-block">
        <p>All the drama.<br>All the troupes.<br>Its all YOU!</p>
    </div>

    <div class="search-box">
        search 🔍
    </div>
</div>

<div class="categories">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7" alt="Romance">
        <h3>Romance</h3>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" alt="Thriller">
        <h3>Thriller</h3>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" alt="Fantasy">
        <h3>Fantasy</h3>
    </div>
</div>

<div class="more">
    MORE...
</div>

</body>
</html>
